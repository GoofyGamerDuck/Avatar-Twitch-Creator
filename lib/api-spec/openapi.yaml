openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Twitch Avatar Studio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: avatar
  - name: users
  - name: parts
  - name: voices
  - name: storage
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /avatar:
    get:
      operationId: getMyAvatar
      tags: [avatar]
      summary: Get authenticated user's avatar settings
      responses:
        "200":
          description: Avatar settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarSettings"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: saveAvatar
      tags: [avatar]
      summary: Save avatar settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarInput"
      responses:
        "200":
          description: Saved avatar settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarSettings"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{username}/avatar:
    get:
      operationId: getUserAvatar
      tags: [users]
      summary: Get avatar settings for a Twitch username
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Avatar settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAvatarResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /parts:
    get:
      operationId: getAvatarParts
      tags: [parts]
      summary: List all active avatar parts
      responses:
        "200":
          description: Active parts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartsListResponse"

  /voices:
    get:
      operationId: getVoices
      tags: [voices]
      summary: List all active voices
      responses:
        "200":
          description: Active voices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoicesListResponse"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    User:
      type: object
      required: [id, twitchId, twitchUsername, displayName]
      properties:
        id:
          type: integer
        twitchId:
          type: string
        twitchUsername:
          type: string
        displayName:
          type: string
        profileImageUrl:
          type: ["string", "null"]

    PartPosition:
      type: object
      required: [x, y]
      properties:
        x:
          type: number
        y:
          type: number
        scale:
          type: number

    PartPositions:
      type: object
      properties:
        hair:
          $ref: "#/components/schemas/PartPosition"
        eyes:
          $ref: "#/components/schemas/PartPosition"
        mouth:
          $ref: "#/components/schemas/PartPosition"
        outfit:
          $ref: "#/components/schemas/PartPosition"
        accessory:
          $ref: "#/components/schemas/PartPosition"
        head:
          $ref: "#/components/schemas/PartPosition"

    AccessoryItem:
      type: object
      required: [name, color]
      properties:
        name:
          type: string
        color:
          type: string

    AvatarSettings:
      type: object
      required: [id, userId, skinTone, hairStyle, hairColor, headShape, eyeStyle, eyeColor, eyeWidth, eyeSpacing, mouthStyle, mouthColor, outfitStyle, outfitColor, accessoryColor, backgroundColor, voiceId]
      properties:
        id:
          type: integer
        userId:
          type: integer
        skinTone:
          type: string
        hairStyle:
          type: string
        hairColor:
          type: string
        headShape:
          type: string
        eyeStyle:
          type: string
        eyeColor:
          type: string
        eyeWidth:
          type: number
        eyeSpacing:
          type: number
        mouthStyle:
          type: string
        mouthColor:
          type: string
        outfitStyle:
          type: string
        outfitColor:
          type: string
        accessory:
          type: ["string", "null"]
        accessoryColor:
          type: string
        accessories:
          type: array
          items:
            $ref: "#/components/schemas/AccessoryItem"
        layerOrder:
          type: array
          items:
            type: string
        backgroundColor:
          type: string
        voiceId:
          type: string
        partPositions:
          $ref: "#/components/schemas/PartPositions"

    AvatarInput:
      type: object
      required: [skinTone, hairStyle, hairColor, headShape, eyeStyle, eyeColor, eyeWidth, eyeSpacing, mouthStyle, mouthColor, outfitStyle, outfitColor, accessoryColor, backgroundColor, voiceId]
      properties:
        skinTone:
          type: string
        hairStyle:
          type: string
        hairColor:
          type: string
        headShape:
          type: string
        eyeStyle:
          type: string
        eyeColor:
          type: string
        eyeWidth:
          type: number
        eyeSpacing:
          type: number
        mouthStyle:
          type: string
        mouthColor:
          type: string
        outfitStyle:
          type: string
        outfitColor:
          type: string
        accessory:
          type: ["string", "null"]
        accessoryColor:
          type: string
        accessories:
          type: array
          items:
            $ref: "#/components/schemas/AccessoryItem"
        layerOrder:
          type: array
          items:
            type: string
        backgroundColor:
          type: string
        voiceId:
          type: string
        partPositions:
          $ref: "#/components/schemas/PartPositions"

    PublicAvatarResponse:
      type: object
      required: [twitchUsername, displayName, avatar]
      properties:
        twitchUsername:
          type: string
        displayName:
          type: string
        profileImageUrl:
          type: ["string", "null"]
        avatar:
          $ref: "#/components/schemas/AvatarSettings"

    AvatarPart:
      type: object
      required: [id, category, name, label, imageUrl, sortOrder]
      properties:
        id:
          type: integer
        category:
          type: string
        name:
          type: string
        label:
          type: string
        imageUrl:
          type: string
        isActive:
          type: boolean
        isBuiltIn:
          type: boolean
        allowColorOverride:
          type: boolean
        sortOrder:
          type: integer

    PartsListResponse:
      type: object
      required: [parts]
      properties:
        parts:
          type: array
          items:
            $ref: "#/components/schemas/AvatarPart"

    Voice:
      type: object
      required: [id, name, description, pitch, rate]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        pitch:
          type: number
        rate:
          type: number
        browserVoiceName:
          type: ["string", "null"]
        modelPath:
          type: ["string", "null"]
        modelConfigPath:
          type: ["string", "null"]
        isActive:
          type: boolean
        isBuiltIn:
          type: boolean
        sortOrder:
          type: integer

    VoicesListResponse:
      type: object
      required: [voices]
      properties:
        voices:
          type: array
          items:
            $ref: "#/components/schemas/Voice"

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
