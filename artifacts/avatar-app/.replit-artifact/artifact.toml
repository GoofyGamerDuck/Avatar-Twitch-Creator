kind = "web"
previewPath = "/"
title = "Twitch Avatar Studio"
version = "1.0.0"
id = "artifacts/avatar-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21725

[services.development]
run = "pnpm --filter @workspace/avatar-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/avatar-app", "run", "build" ]
publicDir = "artifacts/avatar-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21725"
BASE_PATH = "/"
